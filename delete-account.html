function detectLang() {
  const saved = localStorage.getItem('together_lang')
  if (saved && CONTENT[saved]) return saved
  const nav = (navigator.language || 'en').toLowerCase()
  if (nav.startsWith('zh-tw') || nav.startsWith('zh-hk') || nav.startsWith('zh-hant')) return 'zh-TW'
  if (nav.startsWith('zh')) return 'zh-CN'
  if (nav.startsWith('ms')) return 'ms'
  return 'en'
}

function render(lang) {
  const c = CONTENT[lang]
  document.title = c.docTitle
  document.documentElement.lang = lang
  document.getElementById('title').textContent = c.title
  document.getElementById('appLine').textContent = c.appLine
  document.getElementById('intro').textContent = c.intro
  document.getElementById('h2InApp').textContent = c.h2InApp
  document.getElementById('inAppSteps').innerHTML = c.inAppSteps.map(s => '<li>' + s + '</li>').join('')
  document.getElementById('h2Email').textContent = c.h2Email
  document.getElementById('emailIntro').textContent = c.emailIntro
  document.getElementById('emailTemplate').textContent = c.emailTemplate
  document.getElementById('h2Data').textContent = c.h2Data
  document.getElementById('thType').textContent = c.thType
  document.getElementById('thAction').textContent = c.thAction
  document.getElementById('thWhen').textContent = c.thWhen
  document.getElementById('dataRows').innerHTML = c.dataRows
    .map(r => '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td><td>' + r[2] + '</td></tr>')
    .join('')
  document.getElementById('h2Note').textContent = c.h2Note
  document.getElementById('noteBody').textContent = c.noteBody
  document.getElementById('lnkBack').textContent = c.lnkBack
  document.getElementById('lnkPrivacy').textContent = c.lnkPrivacy
  document.getElementById('lnkTerms').textContent = c.lnkTerms

  document.querySelectorAll('.lang-switch button').forEach(btn => {
    btn.classList.toggle('on', btn.dataset.lang === lang)
  })
}

document.querySelectorAll('.lang-switch button').forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.dataset.lang
    localStorage.setItem('together_lang', lang)
    render(lang)
  })
})
