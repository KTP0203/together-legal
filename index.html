<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Together — Legal</title>
<style>
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #fff5f7 0%, #ffe6f0 100%);
    color: #2a1a22;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #fff;
    padding: 48px 36px;
    border-radius: 24px;
    box-shadow: 0 10px 40px rgba(255, 107, 157, .15);
    text-align: center;
    max-width: 420px;
    width: 90%;
  }
  h1 { color: #c2185b; margin: 0 0 8px; font-size: 32px; }
  .sub { color: #8b6571; margin: 0 0 32px; font-size: 14px; }
  .row { display: flex; flex-direction: column; gap: 12px; }
  a.btn {
    display: block;
    padding: 14px 24px;
    background: #ff6b9d;
    color: #fff;
    border-radius: 100px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    transition: background .15s;
  }
  a.btn:hover { background: #e55a8b; }
  a.btn.ghost { background: #fff; color: #ff6b9d; border: 1.5px solid #ff6b9d; }
  a.btn.ghost:hover { background: #fff0f5; }
  .foot { margin-top: 28px; font-size: 12px; color: #b58a99; }
</style>
</head>
<body>
<div class="card">
  <h1>Together</h1>
  <p class="sub">Legal documents</p>
  <div class="row">
    <a class="btn" href="privacy.html">Privacy Policy · 隐私政策</a>
    <a class="btn ghost" href="terms.html">Terms of Service · 用户协议</a>
  </div>
  <p class="foot">khootaipping@gmail.com</p>
</div>
</body>
</html>
