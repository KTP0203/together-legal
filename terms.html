function render(lang) {
  const d = DATA[lang] || DATA['zh-CN'];
  document.documentElement.lang = lang;
  document.title = d.title;
  document.getElementById('title').textContent = d.title;
  document.getElementById('updated').textContent = d.updated;
  document.getElementById('intro').textContent = d.intro;
  const wrap = document.getElementById('sections');
  wrap.innerHTML = '';
  for (const s of d.sections) {
    const h = document.createElement('h2');
    h.textContent = s.t;
    const p = document.createElement('p');
    p.className = 'body';
    p.textContent = s.b;
    wrap.appendChild(h);
    wrap.appendChild(p);
  }
  for (const btn of document.querySelectorAll('.lang-switch button')) {
    btn.classList.toggle('on', btn.dataset.lang === lang);
  }
  try { localStorage.setItem('together-legal-lang', lang); } catch (e) {}
}

const saved = (() => { try { return localStorage.getItem('together-legal-lang'); } catch (e) { return null; } })();
const navLang = (navigator.language || 'zh-CN');
let initial = saved
  || (navLang.startsWith('zh-TW') || navLang.startsWith('zh-HK') ? 'zh-TW'
   : navLang.startsWith('zh') ? 'zh-CN'
   : navLang.startsWith('ms') ? 'ms'
   : navLang.startsWith('en') ? 'en'
   : 'zh-CN');
render(initial);
for (const btn of document.querySelectorAll('.lang-switch button')) {
  btn.addEventListener('click', () => render(btn.dataset.lang));
}
